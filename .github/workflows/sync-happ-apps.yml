name: Sync Happ Apps to CDN

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CDN_UPLOAD_TOKEN: ${{ secrets.CDN_UPLOAD_TOKEN }}
  UPLOAD_BASE: "https://origin-cdn.nurvps.com/upload/apps"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Android APKs
        run: |
          REPO="Happ-proxy/happ-android"
          VERSION_URL="https://origin-cdn.nurvps.com/apps/.android_version"

          LATEST_TAG=$(gh api repos/${REPO}/releases/latest --jq '.tag_name')
          echo "Latest android tag: $LATEST_TAG"

          CURRENT_TAG=$(curl -fsS "$VERSION_URL" 2>/dev/null || echo '')
          echo "Current android tag: $CURRENT_TAG"

          if [ "$LATEST_TAG" = "$CURRENT_TAG" ]; then
            echo "Android APKs are up to date ($LATEST_TAG), skipping."
            exit 0
          fi

          echo "New android version: $CURRENT_TAG -> $LATEST_TAG"

          # Download APKs directly via gh CLI
          for name in Happ.apk Happ_beta.apk; do
            url=$(gh api repos/${REPO}/releases/latest --jq ".assets[] | select(.name == \"${name}\") | .browser_download_url")
            if [ -n "$url" ]; then
              echo "Downloading $name ..."
              curl -fsSL "$url" -o "$name"
              echo "  -> $(du -sh $name | cut -f1)"
            else
              echo "$name not found in this release, skipping."
            fi
          done

          # Upload whatever APKs were downloaded
          DOWNLOADED=$(ls Happ.apk Happ_beta.apk 2>/dev/null || true)
          if [ -z "$DOWNLOADED" ]; then
            echo "No APKs found, skipping upload."
            exit 0
          fi

          for f in $DOWNLOADED; do
            echo "Uploading $f ..."
            curl -fsSL -X PUT \
              -H "Authorization: Bearer $CDN_UPLOAD_TOKEN" \
              --data-binary @"$f" \
              "${UPLOAD_BASE}/${f}"
          done

          # Update version marker
          echo "$LATEST_TAG" | curl -fsSL -X PUT \
            -H "Authorization: Bearer $CDN_UPLOAD_TOKEN" \
            --data-binary @- \
            "${UPLOAD_BASE}/.android_version"

          echo "Done. Uploaded: $DOWNLOADED (tag $LATEST_TAG)"

      - name: Sync Desktop EXE
        run: |
          REPO="Happ-proxy/happ-desktop"
          VERSION_URL="https://origin-cdn.nurvps.com/apps/.desktop_version"

          # Get latest release including prerelease (first in list)
          RELEASE=$(gh api repos/${REPO}/releases --jq '.[0]')
          LATEST_TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          echo "Latest desktop tag: $LATEST_TAG"

          CURRENT_TAG=$(curl -fsS "$VERSION_URL" 2>/dev/null || echo '')
          echo "Current desktop tag: $CURRENT_TAG"

          if [ "$LATEST_TAG" = "$CURRENT_TAG" ]; then
            echo "Desktop EXE is up to date ($LATEST_TAG), skipping."
            exit 0
          fi

          echo "New desktop version: $CURRENT_TAG -> $LATEST_TAG"

          EXE_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name == "setup-Happ.x64.exe") | .browser_download_url')
          if [ -z "$EXE_URL" ]; then
            echo "setup-Happ.x64.exe not found in release assets, skipping."
            exit 0
          fi

          echo "Downloading setup-Happ.x64.exe -> rename to setup-Happ.x86.exe ..."
          curl -fsSL "$EXE_URL" -o "setup-Happ.x86.exe"
          echo "  -> $(du -sh setup-Happ.x86.exe | cut -f1)"

          curl -fsSL -X PUT \
            -H "Authorization: Bearer $CDN_UPLOAD_TOKEN" \
            --data-binary @"setup-Happ.x86.exe" \
            "${UPLOAD_BASE}/setup-Happ.x86.exe"

          # Update version marker
          echo "$LATEST_TAG" | curl -fsSL -X PUT \
            -H "Authorization: Bearer $CDN_UPLOAD_TOKEN" \
            --data-binary @- \
            "${UPLOAD_BASE}/.desktop_version"

          echo "Done. Uploaded setup-Happ.x86.exe (tag $LATEST_TAG)"
