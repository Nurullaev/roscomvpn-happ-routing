name: Sync from upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync data files from upstream and apply custom names
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add upstream https://github.com/hydraponique/roscomvpn-routing.git
          git -c http.extraheader="" fetch upstream

          git checkout upstream/main -- HAPP/ INCY/

          # Apply custom names
          for f in HAPP/DEFAULT.JSON HAPP/WHITELIST.JSON INCY/DEFAULT.JSON INCY/WHITELIST.JSON; do
            tmp="$(mktemp)"
            jq --arg name "NurVPN" '.Name = $name' "$f" > "$tmp"
            mv "$tmp" "$f"
          done
          for f in HAPP/JSONSUB.JSON INCY/JSONSUB.JSON; do
            tmp="$(mktemp)"
            jq --arg name "NurVPN JSON" '.Name = $name' "$f" > "$tmp"
            mv "$tmp" "$f"
          done

          # Extract geo file URLs from upstream JSON
          GEOIP_URL="$(jq -r '.Geoipurl' HAPP/DEFAULT.JSON)"
          GEOSITE_URL="$(jq -r '.Geositeurl' HAPP/DEFAULT.JSON)"
          echo "Geoipurl:   $GEOIP_URL"
          echo "Geositeurl: $GEOSITE_URL"

          # Download geo files
          curl -fsSL "$GEOIP_URL" -o geoip.dat
          curl -fsSL "$GEOSITE_URL" -o geosite.dat
          echo "Downloaded: $(du -sh geoip.dat geosite.dat)"

          # Replace URLs in all JSON files with own CDN
          CDN_GEOIP="https://cdn.nurvps.com/geo/geoip.dat"
          CDN_GEOSITE="https://cdn.nurvps.com/geo/geosite.dat"
          for f in HAPP/DEFAULT.JSON HAPP/WHITELIST.JSON HAPP/JSONSUB.JSON \
                   INCY/DEFAULT.JSON INCY/WHITELIST.JSON INCY/JSONSUB.JSON; do
            tmp="$(mktemp)"
            jq --arg geoip "$CDN_GEOIP" --arg geosite "$CDN_GEOSITE" \
              '.Geoipurl = $geoip | .Geositeurl = $geosite' "$f" > "$tmp"
            mv "$tmp" "$f"
          done

          # Regenerate deeplinks
          for f in DEFAULT WHITELIST JSONSUB; do
            b64="$(jq -c . HAPP/${f}.JSON | base64 -w 0)"
            printf 'happ://routing/onadd/%s\n' "$b64" > HAPP/${f}.DEEPLINK
            b64="$(jq -c . INCY/${f}.JSON | base64 -w 0)"
            printf 'incy://routing/onadd/%s\n' "$b64" > INCY/${f}.DEEPLINK
          done

          git add HAPP/ INCY/
          if git diff --cached --quiet; then
            echo "Already up to date"
          else
            git commit -m "sync from upstream + apply NurVPN names"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Upload geo files to CDN
        env:
          CDN_UPLOAD_TOKEN: ${{ secrets.CDN_UPLOAD_TOKEN }}
        run: |
          UPLOAD_BASE="https://origin-cdn.nurvps.com/upload/geo"

          for f in geoip.dat geosite.dat; do
            echo "Uploading $f ..."
            curl -fsSL -X PUT \
              -H "Authorization: Bearer $CDN_UPLOAD_TOKEN" \
              --data-binary @"$f" \
              "${UPLOAD_BASE}/${f}"
            echo "  -> uploaded $f ($(du -sh $f | cut -f1))"
          done

          echo "Done. Verifying:"
          curl -fsI "https://cdn.nurvps.com/geo/geoip.dat" | grep -E "HTTP|Content-Length|Last-Modified"
          curl -fsI "https://cdn.nurvps.com/geo/geosite.dat" | grep -E "HTTP|Content-Length|Last-Modified"
