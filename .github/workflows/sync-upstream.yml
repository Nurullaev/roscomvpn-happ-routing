name: Sync from upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync data files from upstream
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote add upstream https://github.com/hydraponique/roscomvpn-routing.git
          git fetch upstream
          git checkout upstream/main -- HAPP/ INCY/
          if git diff --cached --quiet; then
            echo "Already up to date"
          else
            git commit -m "sync data from upstream"
            git push origin main
          fi
