name: Sync from upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/hydraponique/roscomvpn-routing.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          git push origin main
